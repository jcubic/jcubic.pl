links:

defaults:
  -
    scope:
      path: ""      # empty string for all files
      type: posts   # limit to posts
    values:
      is_post: true # automatically set is_post=true for all posts

sitemap:
  lastmod: 2026-04-30 02:24:16+0200
  priority: 1.0
  changefreq: weekly

paginate: 10
paginate_path: "/page:num"
tag_sitemap_layout: tag_sitemap
tag_page_layout: tag_page
tag_page_dir: tag
tag_sitemap_name: "tag_sitemap.xml"
tag_sitemap_dir: .
tag_permalink_style: pretty

# Build settings
markdown: kramdown

highlighter: pygments
permalink: /:year/:month/:title.html
kramdown:
    input: GFM
    hard_wrap: false
    smart_quotes:  ["rsquo", "rsquo", "bdquo", "rdquo"]
plugins:
  - jekyll-paginate
  - jekyll-regex-replace
